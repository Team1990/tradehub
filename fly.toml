app = "tradehub"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Keep free machine from sleeping
  auto_start_machines = true
  min_machines_running = 0    # Scale to zero on free plan
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[env]
  NODE_ENV = "production"
  PORT = "8080"
  JWT_EXPIRES_IN = "7d"
  UPLOAD_DIR = "./uploads"
  CORS_ORIGIN = "https://tradehub.fly.dev"
