services:
  # Single web service: backend API + serves frontend static files
  - type: web
    name: tradehub
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      cd backend && npm install && npx prisma generate && cd ../frontend && npm install && npm run build && cd ..
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: tradehub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://tradehub.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads

  - type: postgresql
    name: tradehub-db
    plan: free
    region: singapore
