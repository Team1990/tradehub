services:
  - type: web
    name: tradehub
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://tradehub.onrender.com
      - key: UPLOAD_DIR
        value: ./uploads
