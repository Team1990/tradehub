version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: b2b-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: b2b_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b-api
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/b2b_marketplace?schema=public"
      JWT_SECRET: "production-secret-change-me"
      JWT_EXPIRES_IN: "7d"
      PORT: 4000
      NODE_ENV: production
      UPLOAD_DIR: "./uploads"
      CORS_ORIGIN: "https://yourdomain.com"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
